<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Orpheus Outline</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

#timeline {
  max-width: 900px;
  margin: auto;
}

/* DATE HEADER */
.section {
  font-size: 26px;
  margin-top: 40px;
  border-left: 4px solid #555;
  padding-left: 12px;
  color: #ddd;
}

/* EVENT CARD (TITLE ONLY) */
.event {
  margin: 10px 0 10px 25px;
  padding: 10px;
  border-left: 2px solid #333;
  background: rgba(255,255,255,0.03);
  border-radius: 6px;
  cursor: pointer;
  transition: 0.15s;
}

.event:hover {
  background: rgba(255,255,255,0.07);
  transform: translateX(3px);
}

.title {
  font-size: 16px;
  font-weight: bold;
  color: #9ad1ff;
}

/* =========================
   MODAL POPUP
   ========================= */

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: #1a1a1a;
  margin: 10% auto;
  padding: 20px;
  width: 60%;
  border-radius: 10px;
  border: 1px solid #333;
}

.modal-title {
  font-size: 20px;
  color: #9ad1ff;
  margin-bottom: 10px;
}

.modal-date {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
}

.modal-summary {
  color: #ccc;
  margin-top: 10px;
  line-height: 1.4em;
}

.modal-category {
  font-size: 12px;
  color: #888;
  margin-top: 10px;
}

.close {
  float: right;
  font-size: 22px;
  cursor: pointer;
  color: #aaa;
}

.close:hover {
  color: white;
}
</style>
</head>

<body>

<h1>The Orpheus Outline</h1>
<div id="timeline"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeBtn" class="close">×</span>

    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-summary" id="modalSummary"></div>
    <div class="modal-category" id="modalCategory"></div>
  </div>
</div>

<script>
/* =========================
   BBD / ABD SORT SYSTEM
   ========================= */

function parseDate(dateStr) {
  const parts = dateStr.split(" ");
  const num = parseInt(parts[0]) || 0;
  const era = parts[1] || "ABD";

  let sortValue = num;

  if (era === "BBD") {
    sortValue = -Math.abs(num) - 1;
  }

  if (era === "ABD") {
    sortValue = Math.abs(num);
  }

  return { era, num, sortValue };
}

/* =========================
   MODAL LOGIC
   ========================= */

const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalDate = document.getElementById("modalDate");
const modalSummary = document.getElementById("modalSummary");
const modalCategory = document.getElementById("modalCategory");

document.getElementById("closeBtn").onclick = () => {
  modal.style.display = "none";
};

window.onclick = (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
};

function openModal(event) {
  modalTitle.textContent = event.title;
  modalDate.textContent = event.date;
  modalSummary.textContent = event.summary;
  modalCategory.textContent = event.category || "";
  modal.style.display = "block";
}

/* =========================
   LOAD DATA
   ========================= */

fetch("manifest.json")
  .then(r => r.json())
  .then(files => {

    return Promise.all(
      files.map(path =>
        fetch(path).then(r => r.json()) // full path system
      )
    );

  })
  .then(events => {

    const container = document.getElementById("timeline");

    // sort using BBD/ABD rules
    events.forEach(e => {
      e._sort = parseDate(e.date).sortValue;
    });

    events.sort((a, b) => a._sort - b._sort);

    let currentGroup = null;

    for (const e of events) {

      const group = e.date;

      if (group !== currentGroup) {
        currentGroup = group;

        const header = document.createElement("div");
        header.className = "section";
        header.textContent = group;
        container.appendChild(header);
      }

      const div = document.createElement("div");
      div.className = "event";

      div.innerHTML = `
        <div class="title">${e.title}</div>
      `;

      div.addEventListener("click", () => openModal(e));

      container.appendChild(div);
    }

  });
</script>

</body>
</html>
